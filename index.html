<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarryMe | Society Services</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- Navbar -->
<header class="bg-white shadow p-4 flex justify-between">
  <h1 class="text-xl font-bold">CarryMe</h1>
  <button onclick="openLogin()" class="bg-blue-600 text-white px-4 py-2 rounded">
    Login
  </button>
</header>

<!-- Hero -->
<section class="text-center p-10">
  <h2 class="text-3xl font-bold">Welcome to CarryMe</h2>
  <p class="text-gray-500 mt-2">
    Book services, raise complaints, and manage your society easily.
  </p>

  <button onclick="payNow()" class="mt-5 bg-black text-white px-6 py-2 rounded">
    Try Service ₹99
  </button>
</section>

<!-- Services -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6">

  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-bold">Plumber</h3>
    <p class="text-gray-500">Fix leaks and pipe issues</p>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-bold">Electrician</h3>
    <p class="text-gray-500">Electrical repairs</p>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h3 class="font-bold">Complaint</h3>
    <p class="text-gray-500">Raise issues instantly</p>
  </div>

</section>

<!-- Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-80">
    <h2 class="text-xl font-bold mb-4">Login / Sign Up</h2>

    <input id="email" type="email" placeholder="Enter Email"
      class="w-full border p-2 mb-2 rounded">

    <input id="password" type="password" placeholder="Enter Password"
      class="w-full border p-2 mb-2 rounded">

    <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">
      Login
    </button>

    <button onclick="signup()" class="bg-green-500 text-white w-full py-2 mt-2 rounded">
      Sign Up
    </button>

    <button onclick="closeLogin()" class="mt-2 text-gray-500 w-full">
      Cancel
    </button>
  </div>
</div>

<!-- Scripts -->
<script>
// Open/Close modal
function openLogin() {
  document.getElementById("loginModal").classList.remove("hidden");
}

function closeLogin() {
  document.getElementById("loginModal").classList.add("hidden");
}

// Supabase setup
const supabaseClient = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_ANON_KEY"
);

// Sign Up
async function signup() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert("Signup Error: " + error.message);
  } else {
    alert("Signup successful! Please check your email.");
  }
}

// Login
async function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    alert("Login Error: " + error.message);
  } else {
    alert("Login successful!");
    closeLogin();
  }
}

// Razorpay Payment
function payNow() {
  var options = {
    key: "YOUR_RAZORPAY_KEY",
    amount: 9900,
    currency: "INR",
    name: "CarryMe",
    description: "Service Payment",
    handler: function () {
      alert("Payment Successful!");
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}
</script>

</body>
</html>
