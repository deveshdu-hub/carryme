<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarryMe Store</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Nunito',sans-serif;
  background:#fff8f0;
}

/* HEADER */
header {
  background:#000;
  color:#fff;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
}
.logo {font-size:24px;font-weight:900;}
.logo span {color:red;}

/* HERO */
.hero {
  text-align:center;
  padding:60px 20px;
  background:#111;
  color:#fff;
}
.hero h1 span {color:yellow;}

.btn {
  background:#25d366;
  color:white;
  padding:12px 20px;
  text-decoration:none;
  border-radius:30px;
  display:inline-block;
  margin-top:20px;
}

/* PRODUCTS */
.products {
  padding:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover {transform:translateY(-5px);}

.card img {
  width:100%;
  border-radius:10px;
}

.card h3 {margin:10px 0 5px;}

.price {
  color:red;
  font-weight:bold;
  font-size:18px;
}

button {
  width:100%;
  margin-top:10px;
  background:#000;
  color:#fff;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover {background:red;}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#000;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <div class="logo">Carry<span>Me</span></div>
  <div>India
