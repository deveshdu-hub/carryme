<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CoverEase</title>

<style>
body {font-family: Arial; margin:0; background:#f1f3f6;}
header {background:#2874f0; color:white; padding:15px; text-align:center;}
.products {display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px;}
.card {background:white; padding:10px; border-radius:8px;}
.card img {width:100%;}
.btn {background:#fb641b; color:white; padding:8px; border:none; width:100%; margin-top:5px;}
.footer {position:fixed; bottom:0; width:100%; background:white; padding:10px;}
</style>
</head>

<body>

<header>🛍️ CoverEase Store</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Washing Machine Cover</h4>
<p>₹399</p>
<button class="btn" onclick="addToCart('Washing Cover',399)">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h4>Table Cover</h4>
<p>₹299</p>
<button class="btn" onclick="addToCart('Table Cover',299)">Add</button>
</div>

</div>

<div class="footer">
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
let cart=[];
function addToCart(name,price){
cart.push({name,price});
alert("Added: "+name);
}
function checkout(){
let msg="Order:%0A";
cart.forEach(i=>{
msg+=i.name+" ₹"+i.price+"%0A";
});
window.open("https://wa.me/919555128890?text="+msg);
}
</script>

</body>
</html>
