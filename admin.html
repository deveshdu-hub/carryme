<!DOCTYPE html>
<html>
<head>
<title>CarryMe Admin</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

var admin = require("firebase-admin");

var serviceAccount = require("path/to/serviceAccountKey.json");

admin.initializeApp({
  credential: admin.credential.cert(serviceAccount)
});


const app = initializeApp(firebaseConfig);
const db = getFirestore();

async function loadOrders(){
  const querySnapshot = await getDocs(collection(db, "orders"));
  let html = "";

  querySnapshot.forEach((docSnap) => {
    let data = docSnap.data();

    html += `
      <div style="border:1px solid #ccc;padding:10px;margin:10px">
        <h3>Order ID: ${docSnap.id}</h3>
        <p>Total: ₹${data.total}</p>
        <p>Status: ${data.status}</p>
        <button onclick="updateStatus('${docSnap.id}','Shipped')">Mark Shipped</button>
        <button onclick="updateStatus('${docSnap.id}','Delivered')">Mark Delivered</button>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

window.updateStatus = async function(id, status){
  await updateDoc(doc(db,"orders",id),{
    status: status
  });
  alert("Updated!");
  loadOrders();
}

window.onload = loadOrders;
</script>

</head>

<body>
<h1>CarryMe Admin Panel</h1>

<div id="orders">Loading...</div>

</body>
</html>
